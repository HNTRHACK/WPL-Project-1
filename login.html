<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to HydroTrack to start tracking your water usage." />
  <title>Login – HydroTrack</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="rain-page">

  <!-- Falling Water Background -->
  <div class="rain-bg">
    <div class="drop" style="left:3%;  --dur:2.1s; --delay:0s;   --w:2px; --h:16px; --opacity:0.35;"></div>
    <div class="drop" style="left:8%;  --dur:2.8s; --delay:0.4s; --w:1.5px; --h:22px; --opacity:0.25;"></div>
    <div class="drop" style="left:14%; --dur:1.9s; --delay:0.8s; --w:2px; --h:14px; --opacity:0.4;"></div>
    <div class="drop" style="left:20%; --dur:2.5s; --delay:0.2s; --w:1.5px; --h:20px; --opacity:0.3;"></div>
    <div class="drop" style="left:27%; --dur:2.3s; --delay:1.1s; --w:2px; --h:18px; --opacity:0.35;"></div>
    <div class="drop" style="left:33%; --dur:3.0s; --delay:0.6s; --w:1px; --h:24px; --opacity:0.2;"></div>
    <div class="drop" style="left:39%; --dur:2.0s; --delay:0.3s; --w:2px; --h:15px; --opacity:0.4;"></div>
    <div class="drop" style="left:45%; --dur:2.6s; --delay:1.4s; --w:1.5px; --h:19px; --opacity:0.3;"></div>
    <div class="drop" style="left:52%; --dur:2.2s; --delay:0.7s; --w:2px; --h:17px; --opacity:0.35;"></div>
    <div class="drop" style="left:58%; --dur:2.9s; --delay:0.1s; --w:1px; --h:22px; --opacity:0.25;"></div>
    <div class="drop" style="left:63%; --dur:1.8s; --delay:1.0s; --w:2px; --h:13px; --opacity:0.45;"></div>
    <div class="drop" style="left:69%; --dur:2.4s; --delay:0.5s; --w:1.5px; --h:20px; --opacity:0.3;"></div>
    <div class="drop" style="left:74%; --dur:2.7s; --delay:1.3s; --w:2px; --h:16px; --opacity:0.35;"></div>
    <div class="drop" style="left:80%; --dur:2.1s; --delay:0.9s; --w:1px; --h:18px; --opacity:0.2;"></div>
    <div class="drop" style="left:85%; --dur:2.5s; --delay:0.2s; --w:2px; --h:21px; --opacity:0.3;"></div>
    <div class="drop" style="left:90%; --dur:1.7s; --delay:0.6s; --w:1.5px; --h:14px; --opacity:0.4;"></div>
    <div class="drop" style="left:95%; --dur:2.8s; --delay:1.2s; --w:1px; --h:24px; --opacity:0.2;"></div>
    <div class="drop" style="left:11%; --dur:3.2s; --delay:1.5s; --w:1.5px; --h:26px; --opacity:0.18;"></div>
    <div class="drop" style="left:47%; --dur:3.4s; --delay:0.8s; --w:1px; --h:28px; --opacity:0.15;"></div>
    <div class="drop" style="left:76%; --dur:3.1s; --delay:1.7s; --w:1.5px; --h:25px; --opacity:0.2;"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">Hydro<span>Track</span></a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="tracker.html">Track</a></li>
      <li><a href="result.html">Results</a></li>
      <li><a href="feedback.html">Feedback</a></li>
    </ul>
  </nav>

  <!-- Login Card -->
  <div class="card-centered fade-in">
    <div class="card" style="backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); background:rgba(255,255,255,0.88); box-shadow:0 4px 32px rgba(0,0,0,0.08);">
      <div class="text-center">
        <div class="card-icon">💧</div>
        <h1>Welcome</h1>
        <p class="subtitle">Enter your name to get started.</p>
      </div>

      <div id="alert" class="alert alert-error"></div>

      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="username">Your Name</label>
          <input type="text" id="username" placeholder="e.g. Hardik" autocomplete="name" />
          <p class="error-msg" id="username-error">Please enter your name.</p>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          Continue →
        </button>
      </form>

      <div class="divider"></div>
      <p class="text-center">
        <a href="index.html" class="link">← Back to Home</a>
      </p>
    </div>
  </div>

  <script>
    // Mobile nav toggle
    var toggle = document.getElementById('nav-toggle');
    var links  = document.getElementById('nav-links');
    toggle.addEventListener('click', function () {
      toggle.classList.toggle('open');
      links.classList.toggle('open');
    });

    // Prefill
    (function () {
      var saved = localStorage.getItem('hydrotrack_user');
      if (saved) document.getElementById('username').value = saved;
    })();

    function handleLogin(e) {
      e.preventDefault();
      var input  = document.getElementById('username');
      var errMsg = document.getElementById('username-error');
      var name   = input.value.trim();

      input.classList.remove('error');
      errMsg.classList.remove('show');

      if (!name) {
        input.classList.add('error');
        errMsg.classList.add('show');
        input.focus();
        return false;
      }

      localStorage.setItem('hydrotrack_user', name);
      window.location.href = 'dashboard.html';
      return false;
    }
  </script>
</body>
</html>
